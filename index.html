<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Board Sandbox</title>
<style>
:root { --grid-size: 24px; }
body { margin:0; font-family:sans-serif; display:flex; }
#sidebar { width:300px; padding:12px; background:#f3f6fb; overflow:auto; }
#board { flex:1; position:relative; overflow:auto;
  background:
    linear-gradient(#bbb 1px, transparent 1px),
    linear-gradient(90deg, #bbb 1px, transparent 1px);
  background-size: var(--grid-size) var(--grid-size);
}
#surface { width:2200px; height:1400px; position:relative; }

.piece, .textbox {
  position:absolute; cursor:grab; border:2px solid transparent;
}
.piece.selected, .textbox.selected { border-color:blue; }

.piece img { width:100%; height:100%; object-fit:contain; pointer-events:none; }

.textbox {
  min-width:80px; min-height:40px;
  background:white; padding:6px;
}

.textbox[contenteditable] { outline:none; }

.resize-handle {
  position:absolute; width:12px; height:12px;
  right:-6px; bottom:-6px; background:blue;
  cursor:nwse-resize;
}
textarea { width:100%; height:80px; }
button { margin-top:6px; width:100%; }
</style>
</head>
<body>

<div id="sidebar">
  <h3>Import</h3>
  <input type="file" id="fileInput" multiple accept="image/png,image/jpeg">

  <button onclick="addTextbox()">➕ Add Text Box</button>

  <h3>Session</h3>
  <button onclick="generateJsonLink()">Generate JSON Link</button>
  <textarea id="urlBox" placeholder="Your JSON session link will appear here..."></textarea>
  <button onclick="copyJsonLink()">Copy JSON Link</button>
  <button onclick="loadJsonLink()">Load JSON Link</button>
  <button onclick="downloadJsonFile()">Download JSON File</button>
  <input type="file" id="jsonFileInput" accept="application/json,.json">
</div>

<div id="board"><div id="surface"></div></div>

<script>
const surface = document.getElementById('surface');
const fileInput = document.getElementById('fileInput');
const jsonFileInput = document.getElementById('jsonFileInput');
let pieces = [];
let selected = null;

function uid(){ return Math.random().toString(36).slice(2); }

fileInput.onchange = async e => {
  for (let f of e.target.files) {
    const r = new FileReader();
    r.onload = () => addImage(r.result);
    r.readAsDataURL(f);
  }
};

function addImage(src){
  pieces.push({ id:uid(), type:'img', src, x:100, y:100, w:120, h:120 });
  render();
}

function addTextbox(){
  pieces.push({ id:uid(), type:'text', text:'Type here...', x:150, y:150, w:150, h:60 });
  render();
}

function render(){
  surface.innerHTML = '';
  pieces.forEach(p => {
    const el = document.createElement('div');
    el.className = (p.type==='img'?'piece':'textbox') + (p.id===selected?' selected':'');
    el.style.left = p.x+'px';
    el.style.top = p.y+'px';
    el.style.width = p.w+'px';
    el.style.height = p.h+'px';

    if(p.type==='img'){
      const img = document.createElement('img');
      img.src = p.src;
      el.appendChild(img);
    } else {
      el.contentEditable = true;
      el.innerText = p.text;
      el.oninput = () => p.text = el.innerText;
    }

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    el.appendChild(handle);

    el.onpointerdown = e => {
      if (e.target === handle) return;
      selected = p.id;
      let startX=e.clientX, startY=e.clientY;
      let ox=p.x, oy=p.y;

      function move(ev){
        p.x = ox + (ev.clientX-startX);
        p.y = oy + (ev.clientY-startY);
        render();
      }
      function up(){ window.removeEventListener('pointermove',move); }
      window.addEventListener('pointermove',move);
      window.addEventListener('pointerup',up,{once:true});
    };

    handle.onpointerdown = e => {
      e.stopPropagation();
      let startX=e.clientX, startY=e.clientY;
      let ow=p.w, oh=p.h;

      function move(ev){
        p.w = Math.max(40, ow + (ev.clientX-startX));
        p.h = Math.max(30, oh + (ev.clientY-startY));
        render();
      }
      function up(){ window.removeEventListener('pointermove',move); }
      window.addEventListener('pointermove',move);
      window.addEventListener('pointerup',up,{once:true});
    };

    el.ondblclick = ()=>{
      pieces = pieces.filter(x=>x.id!==p.id);
      render();
    };

    surface.appendChild(el);
  });
}

function encodeSessionData(data) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function decodeSessionData(raw) {
  return JSON.parse(decodeURIComponent(escape(atob(raw))));
}

function generateJsonLink(){
  const encoded = encodeSessionData(pieces);
  const url = location.origin + location.pathname + '#json=' + encoded;
  document.getElementById('urlBox').value = url;
  location.hash = 'json=' + encoded;
}

async function copyJsonLink(){
  const box = document.getElementById('urlBox');
  if (!box.value.trim()) generateJsonLink();
  try {
    await navigator.clipboard.writeText(box.value.trim());
  } catch (e) {
    box.focus();
    box.select();
    document.execCommand('copy');
  }
}

function loadJsonLink(){
  try{
    const rawInput = document.getElementById('urlBox').value.trim() || location.href;
    let hash = '';

    if (rawInput.startsWith('http://') || rawInput.startsWith('https://')) {
      const parsed = new URL(rawInput);
      hash = parsed.hash.startsWith('#') ? parsed.hash.slice(1) : parsed.hash;
    } else {
      hash = rawInput.startsWith('#') ? rawInput.slice(1) : rawInput;
    }

    if (!hash.startsWith('json=')) {
      throw new Error('Missing json payload');
    }

    const encoded = hash.slice(5);
    pieces = decodeSessionData(encoded);
    render();
  }catch(e){ alert('Invalid JSON link'); }
}

function downloadJsonFile() {
  try {
    const payload = {
      version: 1,
      savedAt: new Date().toISOString(),
      pieces
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'game-board-session.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    alert('Could not download JSON file');
  }
}

function loadJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (Array.isArray(data)) {
        pieces = data;
      } else if (data && Array.isArray(data.pieces)) {
        pieces = data.pieces;
      } else {
        throw new Error('Invalid JSON structure');
      }
      render();
    } catch (e) {
      alert('Invalid JSON file');
    }
  };
  reader.readAsText(file);
} else {
      hash = rawInput.startsWith('#') ? rawInput.slice(1) : rawInput;
    }

    if (!hash.startsWith('json=')) {
      throw new Error('Missing json payload');
    }

    const encoded = hash.slice(5);
    pieces = decodeSessionData(encoded);
    render();
  }catch(e){ alert('Invalid JSON link'); }
}catch(e){ alert('Invalid URL'); }
}

jsonFileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) loadJsonFile(file);
});

if(location.hash){ loadJsonLink(); }
render();
</script>

</body>
</html>
