<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressionists' Canvas</title>
<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script defer src="https://unpkg.com/mathlive"></script>
<style>
:root {
  --grid-size: 24px;
  --accent: #2f55ff;
  --sidebar-width: 320px;
  --minor-grid: rgba(187, 187, 187, 0.35);
  --major-grid: rgba(187, 187, 187, 0.85);
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body { margin:0; font-family:sans-serif; display:flex; min-height:100vh; overflow:hidden; }
body.sidebar-collapsed #sidebar {
  width: 0;
  min-width: 0;
  padding: 0;
  border-right: none;
  overflow: hidden;
}
body.sidebar-collapsed #sidebar > * {
  opacity: 0;
  pointer-events: none;
}

#sidebar {
  width:var(--sidebar-width); min-width:var(--sidebar-width); padding:12px; background:#f3f6fb; overflow:auto; border-right:1px solid #d9e0ea;
  transition: width 0.22s ease, min-width 0.22s ease, padding 0.22s ease, border-right-color 0.22s ease;
}
#sidebar > * { transition: opacity 0.16s ease; }

#canvas-wrap {
  flex:1; min-width:0; position:relative; display:flex;
}

#canvas {
  flex:1; position:relative; overflow:auto;
  background-color: white;
  background-image:
    linear-gradient(var(--minor-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--minor-grid) 1px, transparent 1px),
    linear-gradient(var(--major-grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--major-grid) 1px, transparent 1px);
  background-size:
    var(--grid-size) var(--grid-size),
    var(--grid-size) var(--grid-size),
    calc(var(--grid-size) * 5) calc(var(--grid-size) * 5),
    calc(var(--grid-size) * 5) calc(var(--grid-size) * 5);
  background-position: 0 0, 0 0, 0 0, 0 0;
}

#surface {
  width:2200px; height:1400px; position:relative;
}

.piece,
.textbox {
  position:absolute;
  border:2px solid transparent;
}

.piece {
  cursor:grab;
}

.piece.selected,
.textbox.selected {
  border-color:var(--accent);
}

.piece img {
  width:100%; height:100%; object-fit:contain; pointer-events:none; display:block;
}

.textbox {
  background:white;
  min-width:140px;
  min-height:72px;
  display:flex;
  flex-direction:column;
}

.textbox-dragbar {
  padding:6px 8px;
  background:#f3f6fb;
  border-bottom:1px solid #d9e0ea;
  cursor:grab;
  font-size:12px;
  color:#566;
  user-select:none;
}

.textbox-content {
  flex:1;
  padding:8px;
  outline:none;
  white-space:pre-wrap;
  overflow:auto;
  min-height:46px;
}

.mathblock {
  position:absolute;
  border:2px solid transparent;
  background:white;
  min-width:260px;
  min-height:170px;
  display:flex;
  flex-direction:column;
}

.mathblock.selected {
  border-color:var(--accent);
}

.mathblock-dragbar {
  padding:6px 8px;
  background:#f3f6fb;
  border-bottom:1px solid #d9e0ea;
  cursor:grab;
  font-size:12px;
  color:#566;
  user-select:none;
}

.mathblock-body {
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow:auto;
}

.mathblock-prompt {
  font-size:14px;
  line-height:1.35;
}

.mathblock math-field {
  width:100%;
  min-height:44px;
  border:1px solid #d9e0ea;
  border-radius:8px;
  padding:8px;
  background:white;
}

.mathblock-preview {
  min-height:28px;
  padding:8px;
  border:1px dashed #d9e0ea;
  border-radius:8px;
  background:#fafcff;
  font-size:14px;
  color:#223;
}

.resize-handle {
  position:absolute;
  width:12px; height:12px;
  right:-6px; bottom:-6px;
  background:var(--accent); border-radius:3px;
  cursor:nwse-resize;
}

.delete-handle {
  position:absolute;
  top:-8px;
  right:-8px;
  width:20px;
  height:20px;
  border:none;
  border-radius:999px;
  background:#ffffff;
  color:var(--accent);
  box-shadow:0 1px 4px rgba(0,0,0,0.18);
  font-size:14px;
  line-height:1;
  display:none;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  padding:0;
}

.piece.selected .delete-handle,
.textbox.selected .delete-handle,
.mathblock.selected .delete-handle {
  display:flex;
}

#mediaContextMenu {
  position:fixed;
  z-index:1000;
  min-width:160px;
  background:white;
  border:1px solid #d9e0ea;
  border-radius:10px;
  box-shadow:0 8px 22px rgba(0,0,0,0.14);
  padding:6px;
  display:none;
}

#mediaContextMenu button {
  margin:0;
  width:100%;
  text-align:left;
  border:none;
  background:transparent;
  padding:10px 12px;
  border-radius:8px;
}

#mediaContextMenu button:hover {
  background:#f3f6fb;
}

#sidebarToggle {
  position:absolute;
  top:14px;
  left:14px;
  z-index:20;
  width:38px;
  height:38px;
  border:1px solid #d9e0ea;
  background:#f3f6fb;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}

#sidebarToggle svg {
  width:18px;
  height:18px;
}

input[type="text"],
input[type="password"],
textarea,
button,
input[type="file"],
select { width:100%; }

textarea { min-height:90px; resize:vertical; }
button, input, textarea, select { margin-top:6px; padding:8px; }
button { cursor:pointer; }
label { display:block; margin-top:10px; font-size:14px; }
.small { font-size:12px; color:#566; line-height:1.35; }
#status {
  margin-top:8px; padding:8px; background:white; border:1px solid #d9e0ea; border-radius:8px;
  font-size:12px; white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="sidebar">
  <h3>Import Data</h3>
  <input type="file" id="fileInput" multiple accept="image/png,image/jpeg,image/svg+xml,.svg">
  <button type="button" onclick="addTextBox()">Add Text Box</button>
  <button type="button" onclick="addMathBlock()">Add Math Block</button>

  <h3>ChemRender</h3>
  <input type="text" id="smilesInput" placeholder="Enter SMILES (e.g. CCO)">
  <button type="button" onclick="addMolecule()">Add Molecule</button>
  <select id="mechanismArrowSelect">
    <option value="reaction">Reaction arrow →</option>
    <option value="equilibrium">Equilibrium ⇌</option>
    <option value="resonance">Resonance ↔</option>
    <option value="curved">Curved electron arrow</option>
  </select>
  <button type="button" onclick="addMechanismArrow()">Add Mechanism Arrow</button>

  <h3>Local Session Save</h3>
  <button type="button" onclick="saveSessionUrl()">Generate URL</button>
  <textarea id="urlBox" placeholder="Local session URL appears here..."></textarea>
  <button type="button" onclick="copyUrl()">Copy URL</button>
  <button type="button" onclick="loadSessionUrl()">Load URL</button>

  <h3>GitHub Session Save</h3>
  <label for="sessionNameInput">Session file name</label>
  <input type="text" id="sessionNameInput" placeholder="demo-canvas">

  <label for="githubOwnerInput">GitHub owner</label>
  <input type="text" id="githubOwnerInput" value="daphjraven" placeholder="daphjraven">

  <label for="githubRepoInput">Repository</label>
  <input type="text" id="githubRepoInput" value="impressionists-canvas" placeholder="impressionists-canvas">

  <label for="githubBranchInput">Branch</label>
  <input type="text" id="githubBranchInput" value="math" placeholder="main">

  <label for="githubFolderInput">Folder path in repo</label>
  <input type="text" id="githubFolderInput" value="data" placeholder="data">

  <label for="githubTokenInput">GitHub personal access token</label>
  <input type="password" id="githubTokenInput" placeholder="'repo' field enabled + write 'access' for 'Note' field">

  <button type="button" onclick="saveSessionToGitHub()">Save Session to GitHub</button>
  <button type="button" onclick="refreshGitHubCanvases()">Refresh GitHub Canvases</button>

  <label for="githubCanvasesSelect">Saved Canvases in GitHub folder</label>
  <select id="githubCanvasesSelect">
    <option value="">Choose a saved canvas...</option>
  </select>
  <button type="button" onclick="loadSelectedGitHubCanvas()">Load Selected GitHub Canvas</button>
  <button type="button" onclick="makeEmbedLink()">Make Notion Embed Link</button>

  <label for="externalUrlInput">External JSON URL</label>
  <input type="text" id="externalUrlInput" placeholder="https://raw.githubusercontent.com/.../data/demo-canvas.json">
  <button type="button" onclick="loadExternalJson()">Load External JSON</button>

  <textarea id="embedBox" placeholder="Smaller Notion embed link appears here..."></textarea>

  <div id="status">Ready.</div>
  <p class="small">This keeps the huge canvas data out of the Notion URL. Each session saves as a JSON file in your GitHub repo, like <code>sessions/demo-canvas.json</code>.</p>
</div>

<div id="canvas-wrap">
  <button type="button" id="sidebarToggle" aria-label="Close sidebar" title="Close sidebar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="4" width="18" height="16" rx="2"></rect>
      <path d="M9 4v16"></path>
      <path id="toggleChevron" d="M15 9l-3 3 3 3"></path>
    </svg>
  </button>
  <div id="canvas"><div id="surface"></div></div>
</div>

<div id="mediaContextMenu">
  <button type="button" id="saveMediaButton">Save media</button>
</div>

<script>
const surface = document.getElementById('surface');
const fileInput = document.getElementById('fileInput');
const urlBox = document.getElementById('urlBox');
const embedBox = document.getElementById('embedBox');
const externalUrlInput = document.getElementById('externalUrlInput');
const statusBox = document.getElementById('status');
const smilesInput = document.getElementById('smilesInput');
const mechanismArrowSelect = document.getElementById('mechanismArrowSelect');
const mediaContextMenu = document.getElementById('mediaContextMenu');
const saveMediaButton = document.getElementById('saveMediaButton');

const sessionNameInput = document.getElementById('sessionNameInput');
const githubOwnerInput = document.getElementById('githubOwnerInput');
const githubRepoInput = document.getElementById('githubRepoInput');
const githubBranchInput = document.getElementById('githubBranchInput');
const githubFolderInput = document.getElementById('githubFolderInput');
const githubTokenInput = document.getElementById('githubTokenInput');
const githubCanvasesSelect = document.getElementById('githubCanvasesSelect');
const sidebarToggle = document.getElementById('sidebarToggle');
const toggleChevron = document.getElementById('toggleChevron');

let pieces = [];
let selected = null;
let sidebarCollapsed = false;
let RDKitModuleRef = null;
let contextMenuPieceId = null;

function uid(){ return Math.random().toString(36).slice(2); }
function setStatus(msg){ statusBox.textContent = msg; }
function clamp(v, min, max){ return Math.min(max, Math.max(min, v)); }
function safeName(name){
  return (name || 'canvas-session')
    .trim()
    .toLowerCase()
    .replace(/\.json$/i, '')
    .replace(/[^a-z0-9-_]+/g, '-')
    .replace(/-+/g, '-')
    .replace(/^-|-$/g, '') || 'canvas-session';
}
function utf8ToBase64(str){ return btoa(unescape(encodeURIComponent(str))); }
function base64ToUtf8(str){ return decodeURIComponent(escape(atob(str))); }
function getPayload(){ return { version: 1, savedAt: new Date().toISOString(), pieces }; }
function getCurrentSiteBase(){ return window.location.origin + window.location.pathname; }
function updateSidebarToggle(){
  document.body.classList.toggle('sidebar-collapsed', sidebarCollapsed);
  sidebarToggle.setAttribute('aria-label', sidebarCollapsed ? 'Open sidebar' : 'Close sidebar');
  sidebarToggle.setAttribute('title', sidebarCollapsed ? 'Open sidebar' : 'Close sidebar');
  toggleChevron.setAttribute('d', sidebarCollapsed ? 'M12 9l3 3-3 3' : 'M15 9l-3 3 3 3');
}
function toggleSidebar(){
  sidebarCollapsed = !sidebarCollapsed;
  updateSidebarToggle();
}
function removePiece(id){
  pieces = pieces.filter(x => x.id !== id);
  if (selected === id) selected = null;
  hideMediaContextMenu();
  render();
}
function hideMediaContextMenu() {
  mediaContextMenu.style.display = 'none';
  contextMenuPieceId = null;
}
function showMediaContextMenu(x, y, pieceId) {
  contextMenuPieceId = pieceId;
  mediaContextMenu.style.left = `${x}px`;
  mediaContextMenu.style.top = `${y}px`;
  mediaContextMenu.style.display = 'block';
}
  
function sanitizeSvgForTransparency(svgText) {
  let cleaned = String(svgText || '');

  // remove full white rect blocks
  cleaned = cleaned.replace(
    /<rect\b[^>]*\bfill=(["'])(#fff|#ffffff|white)\1[^>]*>\s*<\/rect>/gi,
    ''
  );

  cleaned = cleaned.replace(
    /<rect\b[^>]*\bfill=(["'])(#fff|#ffffff|white)\1[^>]*\/>/gi,
    ''
  );

  // catch white fill written in style=""
  cleaned = cleaned.replace(
    /<rect\b([^>]*?)style=(["'])(.*?)\2([^>]*)>/gi,
    function(match, before, quote, styleText, after) {
      let style = styleText
        .replace(/fill\s*:\s*(white|#fff|#ffffff)\s*;?/gi, 'fill:none;')
        .replace(/background(?:-color)?\s*:\s*(white|#fff|#ffffff)\s*;?/gi, 'background:transparent;');
      return '<rect' + before + 'style=' + quote + style + quote + after + '>';
    }
  );

  // convert remaining white-filled rects to transparent
  cleaned = cleaned.replace(
    /<rect\b([^>]*?)\bfill=(["'])(#fff|#ffffff|white)\2([^>]*)>/gi,
    '<rect$1fill="none"$4>'
  );

  // remove white background on svg style if present
  cleaned = cleaned.replace(
    /\bstyle=(["'])([^"']*)\1/gi,
    function(match, quote, styleText) {
      let style = styleText
        .replace(/background(?:-color)?\s*:\s*(white|#fff|#ffffff)\s*;?/gi, 'background:transparent;')
        .replace(/fill\s*:\s*(white|#fff|#ffffff)\s*;?/gi, 'fill:none;');
      return 'style=' + quote + style + quote;
    }
  );

  // force root svg to transparent background
  cleaned = cleaned.replace(
    /<svg\b([^>]*)>/i,
    function(match, attrs) {
      if (/style\s*=/i.test(attrs)) {
        return '<svg' + attrs.replace(
          /style=(["'])(.*?)\1/i,
          function(m, q, style) {
            const patched = style
              .replace(/background(?:-color)?\s*:\s*(white|#fff|#ffffff)\s*;?/gi, '')
              + ';background:transparent';
            return 'style=' + q + patched + q;
          }
        ) + '>';
      }
      return '<svg' + attrs + ' style="background:transparent">';
    }
  );

  return cleaned;
}

function getSvgCanvasSize(svgText) {
  const fallback = { width: 220, height: 160 };

  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(svgText, 'image/svg+xml');
    const svg = doc.querySelector('svg');
    if (!svg) return fallback;

    const widthAttr = svg.getAttribute('width');
    const heightAttr = svg.getAttribute('height');
    const viewBoxAttr = svg.getAttribute('viewBox');

    function parseDim(value) {
      if (!value) return null;
      const match = String(value).match(/([0-9]*\.?[0-9]+)/);
      return match ? Number(match[1]) : null;
    }

    let width = parseDim(widthAttr);
    let height = parseDim(heightAttr);

    if ((!width || !height) && viewBoxAttr) {
      const parts = viewBoxAttr.trim().split(/\s+/).map(Number);
      if (parts.length === 4 && parts.every(n => Number.isFinite(n))) {
        width = width || parts[2];
        height = height || parts[3];
      }
    }

    if (!width || !height) return fallback;

    const maxWidth = 260;
    const maxHeight = 180;
    const scale = Math.min(maxWidth / width, maxHeight / height, 1.8);

    return {
      width: Math.max(120, Math.round(width * scale)),
      height: Math.max(90, Math.round(height * scale))
    };
  } catch (error) {
    return fallback;
  }
}
  
function svgToDataUrl(svgText) {
  const cleaned = sanitizeSvgForTransparency(svgText);
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(cleaned);
}
function downloadTextAsFile(content, filename, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const blobUrl = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = blobUrl;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(blobUrl);
}
function savePieceMedia(piece) {
  if (!piece || piece.type !== 'media') return;
  const safeBase = safeName(piece.name || 'canvas-media');

  if (typeof piece.src === 'string' && piece.src.startsWith('data:image/svg+xml')) {
    const svgContent = decodeURIComponent(piece.src.split(',')[1] || '');
    downloadTextAsFile(svgContent, `${safeBase}.svg`, 'image/svg+xml');
    setStatus('Saved media as SVG.');
    return;
  }

  const link = document.createElement('a');
  link.href = piece.src;
  link.download = /\.svg$/i.test(piece.name || '') ? `${safeBase}.svg` : `${safeBase}.png`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setStatus('Saved media.');
}

async function initializeRDKit() {
  try {
    RDKitModuleRef = await initRDKitModule();
    setStatus('ChemRender ready.');
  } catch (error) {
    console.error(error);
    setStatus('ChemRender could not load.');
  }
}

fileInput.onchange = async e => {
  for (let f of e.target.files) {
    const isSvg = f.type === 'image/svg+xml' || /\.svg$/i.test(f.name);
    const isRaster = f.type === 'image/png' || f.type === 'image/jpeg';
    if (!isSvg && !isRaster) continue;

    const r = new FileReader();
    if (isSvg) {
      r.onload = () => addPiece(svgToDataUrl(r.result), f.name);
      r.readAsText(f);
    } else {
      r.onload = () => addPiece(r.result, f.name);
      r.readAsDataURL(f);
    }
  }
  fileInput.value = '';
};

function addPiece(src, name = 'image'){
  pieces.push({ id:uid(), type:'media', name, src, x:100 + pieces.length * 10, y:100 + pieces.length * 10, w:120, h:120 });
  selected = pieces[pieces.length - 1].id;
  render();
}

function addTextBox(){
  pieces.push({
    id: uid(),
    type: 'text',
    text: 'Type here...',
    x: 140 + pieces.length * 10,
    y: 140 + pieces.length * 10,
    w: 220,
    h: 120
  });
  selected = pieces[pieces.length - 1].id;
  render();
}

function addMathBlock(){
  pieces.push({
    id: uid(),
    type: 'math',
    prompt: 'Practice: Enter an expression such as x^2+1 or \frac{1}{x}.',
    value: '',
    x: 160 + pieces.length * 10,
    y: 160 + pieces.length * 10,
    w: 320,
    h: 210
  });
  selected = pieces[pieces.length - 1].id;
  render();
}

function addMolecule(){
  const smiles = smilesInput.value.trim();
  if (!smiles) {
    setStatus('Enter a SMILES string first.');
    return;
  }

  if (!RDKitModuleRef) {
    setStatus('ChemRender is still loading...');
    return;
  }

  try {
    const mol = RDKitModuleRef.get_mol(smiles);
    if (!mol) throw new Error('Could not parse SMILES');
    const rawSvg = mol.get_svg();
    const transparentSvg = sanitizeSvgForTransparency(rawSvg);
    const encoded = svgToDataUrl(transparentSvg);
    
    pieces.push({
      id: uid(),
      type: 'media',
      name: smiles,
      src: encoded,
      x: 100 + pieces.length * 10,
      y: 100 + pieces.length * 10,
      w: 220,
      h: 160
    });
    selected = pieces[pieces.length - 1].id;
    if (typeof mol.delete === 'function') mol.delete();
    render();
    setStatus('Molecule added to canvas.');
  } catch (error) {
    console.error(error);
    setStatus('Invalid SMILES string.');
  }
}

function createArrowSvg(type) {
  const svgMap = {
  reaction: `<svg xmlns="http://www.w3.org/2000/svg" width="220" height="80" viewBox="0 0 220 80"><path d="M20 40 H180" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M180 40 L160 28 M180 40 L160 52" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,

  equilibrium: `<svg xmlns="http://www.w3.org/2000/svg" width="220" height="90" viewBox="0 0 220 90">
  <path d="M30 30 H180" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M180 30 L165 22 M180 30 L165 38" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M190 60 H40" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M40 60 L55 52 M40 60 L55 68" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>
</svg>`,

  resonance: `<svg xmlns="http://www.w3.org/2000/svg" width="220" height="80" viewBox="0 0 220 80"><path d="M30 40 H190" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M190 40 L172 28 M190 40 L172 52" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M30 40 L48 28 M30 40 L48 52" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,

  curved: `<svg xmlns="http://www.w3.org/2000/svg" width="220" height="140" viewBox="0 0 220 140"><path d="M38 102 C52 62, 95 38, 150 54 C160 58, 168 64, 174 72" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M174 72 L157 64 M174 72 L164 87" stroke="black" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`,

  fishhook: `<svg xmlns="http://www.w3.org/2000/svg" width="220" height="140" viewBox="0 0 220 140"><path d="M40 100 C55 55, 115 40, 165 70" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M165 70 L150 60" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/></svg>`
};

  return svgMap[type] || svgMap.reaction;
}

function addMechanismArrow() {
  const arrowType = mechanismArrowSelect.value || 'reaction';
  const svg = createArrowSvg(arrowType);

  const sizeMap = {
    reaction: { w: 220, h: 80 },
    equilibrium: { w: 220, h: 90 },
    resonance: { w: 220, h: 80 },
    curved: { w: 220, h: 140 },
    fishhook: { w: 220, h: 140 }
  };

  const size = sizeMap[arrowType] || sizeMap.reaction;

  pieces.push({
    id: uid(),
    type: 'media',
    name: `arrow-${arrowType}`,
    src: svgToDataUrl(svg),
    x: 120 + pieces.length * 10,
    y: 120 + pieces.length * 10,
    w: size.w,
    h: size.h
  });

  selected = pieces[pieces.length - 1].id;
  render();
}

function render(){
  surface.innerHTML = '';
  pieces.forEach(p => {
    const isText = p.type === 'text';
    const isMath = p.type === 'math';
    const el = document.createElement('div');
    el.className = (isMath ? 'mathblock' : (isText ? 'textbox' : 'piece')) + (p.id===selected?' selected':'');
    el.style.left = p.x+'px';
    el.style.top = p.y+'px';
    el.style.width = p.w+'px';
    el.style.height = p.h+'px';
    el.dataset.id = p.id;

    const deleteHandle = document.createElement('button');
    deleteHandle.type = 'button';
    deleteHandle.className = 'delete-handle';
    deleteHandle.setAttribute('aria-label', isMath ? 'Delete math block' : (isText ? 'Delete text box' : 'Delete media'));
    deleteHandle.title = isMath ? 'Delete math block' : (isText ? 'Delete text box' : 'Delete media');
    deleteHandle.textContent = '×';
    deleteHandle.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      removePiece(p.id);
    });
    el.appendChild(deleteHandle);

let dragTarget = el;

if (isText) {
  const dragbar = document.createElement('div');
  dragbar.className = 'textbox-dragbar';
  dragbar.textContent = 'Drag text box';
  el.appendChild(dragbar);
  dragTarget = dragbar;

  const content = document.createElement('div');
  content.className = 'textbox-content';
  content.contentEditable = 'true';
  content.spellcheck = false;
  content.textContent = p.text || '';
  content.addEventListener('input', () => {
    p.text = content.textContent;
  });
  content.addEventListener('click', e => {
    e.stopPropagation();
    if (selected !== p.id) {
      selected = p.id;
      render();
    }
  });
  el.appendChild(content);

} else if (isMath) {
  const dragbar = document.createElement('div');
  dragbar.className = 'mathblock-dragbar';
  dragbar.textContent = 'Drag math block';
  el.appendChild(dragbar);
  dragTarget = dragbar;

  const body = document.createElement('div');
  body.className = 'mathblock-body';

  const prompt = document.createElement('div');
  prompt.className = 'mathblock-prompt';
  prompt.textContent = p.prompt || 'Practice math here.';
  body.appendChild(prompt);

  const field = document.createElement('math-field');
  field.setAttribute('virtual-keyboard-mode', 'manual');
  field.value = p.value || '';
  body.appendChild(field);

  const preview = document.createElement('div');
  preview.className = 'mathblock-preview';
  preview.textContent = p.value || 'Preview will appear here.';
  body.appendChild(preview);

  field.addEventListener('input', () => {
    p.value = field.value;
    preview.textContent = p.value || 'Preview will appear here.';
  });

  field.addEventListener('click', e => {
    e.stopPropagation();
    if (selected !== p.id) {
      selected = p.id;
      render();
    }
  });

  el.appendChild(body);

} else {
  const img = document.createElement('img');
  img.src = p.src;
  img.alt = p.name || 'piece';
  el.appendChild(img);

  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    selected = p.id;
    render();
    showMediaContextMenu(e.clientX, e.clientY, p.id);
  });
}

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    el.appendChild(handle);

    dragTarget.addEventListener('pointerdown', e => {
      if (e.target === handle || e.target === deleteHandle) return;
      hideMediaContextMenu();
      selected = p.id;
      const startX = e.clientX, startY = e.clientY;
      const ox = p.x, oy = p.y;

      function move(ev){
        p.x = clamp(ox + (ev.clientX - startX), 0, surface.clientWidth - p.w);
        p.y = clamp(oy + (ev.clientY - startY), 0, surface.clientHeight - p.h);
        el.style.left = p.x + 'px';
        el.style.top = p.y + 'px';
      }
      function up(){
        window.removeEventListener('pointermove', move);
        render();
      }
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up, { once:true });
    });

    handle.addEventListener('pointerdown', e => {
      e.stopPropagation();
      hideMediaContextMenu();
      selected = p.id;
      const startX = e.clientX, startY = e.clientY;
      const ow = p.w, oh = p.h;

      function move(ev){
        p.w = Math.max(isMath ? 260 : (isText ? 140 : 30), ow + (ev.clientX - startX));
        p.h = Math.max(isMath ? 170 : (isText ? 72 : 30), oh + (ev.clientY - startY));
        render();
      }
      function up(){ window.removeEventListener('pointermove', move); render(); }
      window.addEventListener('pointermove', move);
      window.addEventListener('pointerup', up, { once:true });
    });

    if (!isText && !isMath) {
      el.addEventListener('click', e => {
        e.stopPropagation();
        hideMediaContextMenu();
        if (selected !== p.id) {
          selected = p.id;
          render();
        }
      });
    }

    el.addEventListener('dblclick', e => {
      if ((isText && e.target.classList.contains('textbox-content')) || (isMath && (e.target.closest('math-field') || e.target.closest('.mathblock-body')))) return;
      e.preventDefault();
      e.stopPropagation();
      removePiece(p.id);
    });

    surface.appendChild(el);
  });
}

function saveSessionUrl(){
  const data = utf8ToBase64(JSON.stringify(getPayload()));
  const url = getCurrentSiteBase() + '#json=' + data;
  urlBox.value = url;
  location.hash = 'json=' + data;
  setStatus('Local session URL generated.');
}

async function copyUrl(){
  if (!urlBox.value.trim()) saveSessionUrl();
  try {
    await navigator.clipboard.writeText(urlBox.value.trim());
    setStatus('URL copied.');
  } catch {
    urlBox.select();
    document.execCommand('copy');
    setStatus('URL copied with fallback copy.');
  }
}

function loadSessionUrl(){
  try {
    const raw = urlBox.value.trim() || location.hash;
    const hash = raw.includes('://') ? new URL(raw).hash : raw;
    const cleaned = hash.replace(/^#json=/, '').replace(/^#/, '');
    const data = JSON.parse(base64ToUtf8(cleaned));
    pieces = Array.isArray(data) ? data : (data.pieces || []);
    selected = null;
    hideMediaContextMenu();
    render();
    setStatus('Loaded local session URL.');
  } catch (e) {
    alert('Invalid URL');
    setStatus('Could not load local session URL.');
  }
}

async function loadExternalJson(url = externalUrlInput.value){
  const trimmed = (url || '').trim();
  if (!trimmed) {
    setStatus('Paste an external JSON URL first.');
    return;
  }
  try {
    setStatus('Loading external JSON...');
    const res = await fetch(trimmed);
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const data = await res.json();
    pieces = Array.isArray(data) ? data : (data.pieces || []);
    selected = null;
    hideMediaContextMenu();
    externalUrlInput.value = trimmed;
    render();
    setStatus('Loaded external JSON.');
  } catch (e) {
    alert('Could not load external JSON.');
    setStatus('Could not load external JSON. ' + e.message);
  }
}

async function getExistingSha(owner, repo, branch, path, token){
  const endpoint = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path.split('/').map(encodeURIComponent).join('/')}`;
  const res = await fetch(endpoint + `?ref=${encodeURIComponent(branch)}`, {
    headers: {
      'Accept': 'application/vnd.github+json',
      'Authorization': `Bearer ${token}`,
      'X-GitHub-Api-Version': '2022-11-28'
    }
  });
  if (res.status === 404) return null;
  if (!res.ok) throw new Error('Could not check existing file.');
  const data = await res.json();
  return data.sha || null;
}

async function saveSessionToGitHub(){
  const owner = githubOwnerInput.value.trim();
  const repo = githubRepoInput.value.trim();
  const branch = githubBranchInput.value.trim() || 'math';
  const folder = githubFolderInput.value.trim().replace(/^\/+|\/+$/g, '') || 'data';
  const token = githubTokenInput.value.trim();
  const sessionName = safeName(sessionNameInput.value);
  const path = `${folder}/${sessionName}.json`;

  if (!owner || !repo || !token) {
    setStatus('Fill in GitHub owner, repository, and token first.');
    return;
  }

  try {
    setStatus('Saving canvas to GitHub...');
    const sha = await getExistingSha(owner, repo, branch, path, token);
    const payload = utf8ToBase64(JSON.stringify(getPayload(), null, 2));
    const endpoint = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${path.split('/').map(encodeURIComponent).join('/')}`;

    const body = {
      message: `Save canvas ${sessionName}`,
      content: payload,
      branch
    };
    if (sha) body.sha = sha;

    const res = await fetch(endpoint, {
      method: 'PUT',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json',
        'X-GitHub-Api-Version': '2022-11-28'
      },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(err);
    }

    const rawUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;
    externalUrlInput.value = rawUrl;
    setStatus(`Saved canvas to GitHub.\nRaw JSON URL:\n${rawUrl}`);
  } catch (e) {
    alert('GitHub save failed. Check repo name, branch, path, and token access.');
    setStatus('GitHub save failed.\n' + e.message);
  }
}

function populateGitHubCanvases(items) {
  githubCanvasesSelect.innerHTML = '<option value="">Choose a saved canvas...</option>';
  items.forEach(item => {
    const option = document.createElement('option');
    option.value = item.url;
    option.textContent = item.label;
    githubCanvasesSelect.appendChild(option);
  });
}

async function refreshGitHubCanvases(){
  const owner = githubOwnerInput.value.trim();
  const repo = githubRepoInput.value.trim();
  const branch = githubBranchInput.value.trim() || 'math';
  const folder = githubFolderInput.value.trim().replace(/^\/+|\/+$/g, '') || 'data';
  const token = githubTokenInput.value.trim();

  if (!owner || !repo) {
    setStatus('Fill in GitHub owner and repository first.');
    return;
  }

  try {
    setStatus('Loading saved canvases from GitHub...');
    const endpoint = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/${folder.split('/').map(encodeURIComponent).join('/')}?ref=${encodeURIComponent(branch)}`;
    const headers = {
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28'
    };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch(endpoint, { headers });
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const data = await res.json();

    const canvases = (Array.isArray(data) ? data : [])
      .filter(item => item.type === 'file' && /\.json$/i.test(item.name))
      .map(item => ({
        label: item.name.replace(/\.json$/i, ''),
        url: `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${folder}/${item.name}`
      }));

    populateGitHubCanvases(canvases);
    setStatus(canvases.length ? `Loaded ${canvases.length} saved canvas(es) from GitHub.` : 'No saved JSON canvases found in that GitHub folder.');
  } catch (e) {
    alert('Could not load saved canvases from GitHub.');
    setStatus('Could not load saved canvases from GitHub. ' + e.message);
  }
}

async function loadSelectedGitHubCanvas(){
  const selectedUrl = githubCanvasesSelect.value;
  if (!selectedUrl) {
    setStatus('Choose a saved GitHub canvas first.');
    return;
  }
  await loadExternalJson(selectedUrl);
}

function makeEmbedLink(){
  const rawUrl = externalUrlInput.value.trim();
  if (!rawUrl) {
    setStatus('Save canvas to GitHub first, or paste an external JSON URL.');
    return;
  }
  const embedUrl = `${getCurrentSiteBase()}?load=${encodeURIComponent(rawUrl)}`;
  embedBox.value = embedUrl;
  setStatus('Smaller Notion embed link generated.');
}

async function loadFromQueryParam(){
  const params = new URLSearchParams(window.location.search);
  const loadUrl = params.get('load');
  if (loadUrl) {
    externalUrlInput.value = loadUrl;
    await loadExternalJson(loadUrl);
    return true;
  }
  return false;
}

saveMediaButton.addEventListener('click', () => {
  const piece = pieces.find(item => item.id === contextMenuPieceId);
  savePieceMedia(piece);
  hideMediaContextMenu();
});

sidebarToggle.addEventListener('click', toggleSidebar);
document.addEventListener('click', hideMediaContextMenu);
document.addEventListener('scroll', hideMediaContextMenu, true);
window.addEventListener('resize', hideMediaContextMenu);

(async function boot(){
  initializeRDKit();
  if (location.hash.startsWith('#json=')) {
    loadSessionUrl();
  } else {
    await loadFromQueryParam();
  }
  render();
  if (githubOwnerInput.value.trim() && githubRepoInput.value.trim()) {
    refreshGitHubCanvases();
  }
})();
</script>
