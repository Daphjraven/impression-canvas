<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Board Sandbox</title>
<style>
:root {
  --grid-size: 24px;
  --sidebar-bg: #f3f6fb;
  --grid-color: #bdbdbd;
  --select-color: #2f55ff;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  display: flex;
  min-height: 100vh;
}

#sidebar {
  width: 345px;
  padding: 14px 12px;
  background: var(--sidebar-bg);
  overflow: auto;
  border-right: 1px solid #d5ddeb;
}

#sidebar h2,
#sidebar h3 {
  margin: 16px 0 10px;
}

#sidebar h2:first-child,
#sidebar h3:first-child {
  margin-top: 0;
}

#sidebar button,
#sidebar input[type="file"],
#sidebar textarea,
#sidebar input[type="color"],
#sidebar input[type="range"] {
  width: 100%;
}

#sidebar button {
  margin-top: 6px;
  padding: 8px 10px;
  cursor: pointer;
}

#sidebar textarea {
  min-height: 92px;
  resize: vertical;
  margin-top: 6px;
}

.style-row {
  margin: 8px 0;
}

.style-row label {
  display: block;
  margin-bottom: 4px;
}

#opacityValue {
  margin-top: 4px;
}

#board {
  flex: 1;
  position: relative;
  overflow: auto;
  background:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: var(--grid-size) var(--grid-size);
}

#surface {
  width: 2200px;
  height: 1400px;
  position: relative;
}

.item {
  position: absolute;
  border: 2px solid transparent;
  cursor: grab;
  user-select: none;
}

.item.selected {
  border-color: var(--select-color);
}

.item img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  pointer-events: none;
  display: block;
}

.textbox {
  background: #ffffff;
  padding: 8px;
  min-width: 90px;
  min-height: 44px;
  user-select: text;
}

.shape.rectangle {
  border-radius: 8px;
}

.shape.circle {
  border-radius: 999px;
}

.resize-handle {
  position: absolute;
  width: 12px;
  height: 12px;
  right: -7px;
  bottom: -7px;
  background: var(--select-color);
  border-radius: 3px;
  cursor: nwse-resize;
}

.helper {
  font-size: 12px;
  color: #555;
  margin-top: 8px;
  line-height: 1.35;
}
</style>
</head>
<body>
<div id="sidebar">
  <h2>Import</h2>
  <input type="file" id="fileInput" multiple accept="image/png,image/jpeg">
  <button type="button" id="addTextboxBtn">➕ Add Text Box</button>
  <button type="button" id="addRectangleBtn">⬛ Add Rectangle</button>
  <button type="button" id="addCircleBtn">⚪ Add Circle</button>

  <h3>Selected Object Style</h3>
  <div class="style-row">
    <label for="fillColorInput">Fill Color</label>
    <input type="color" id="fillColorInput" value="#4f46e5">
  </div>
  <div class="style-row">
    <label for="opacityInput">Opacity</label>
    <input type="range" id="opacityInput" min="0.05" max="1" step="0.05" value="1">
    <div id="opacityValue">1.00</div>
  </div>

  <h3>Session</h3>
  <button type="button" id="generateJsonBtn">Generate JSON Link</button>
  <textarea id="urlBox" placeholder="Your JSON session link will appear here..."></textarea>
  <button type="button" id="copyJsonBtn">Copy JSON Link</button>
  <button type="button" id="loadJsonBtn">Load JSON Link</button>
  <button type="button" id="downloadJsonBtn">Download JSON File</button>
  <input type="file" id="jsonFileInput" accept="application/json,.json">

  <div class="helper">
    Click an object to select it. Drag to move. Drag the blue corner to resize. Double-click an object to delete it.
  </div>
</div>

<div id="board">
  <div id="surface"></div>
</div>

<script>
const surface = document.getElementById('surface');
const board = document.getElementById('board');
const fileInput = document.getElementById('fileInput');
const jsonFileInput = document.getElementById('jsonFileInput');
const fillColorInput = document.getElementById('fillColorInput');
const opacityInput = document.getElementById('opacityInput');
const opacityValue = document.getElementById('opacityValue');
const urlBox = document.getElementById('urlBox');

const addTextboxBtn = document.getElementById('addTextboxBtn');
const addRectangleBtn = document.getElementById('addRectangleBtn');
const addCircleBtn = document.getElementById('addCircleBtn');
const generateJsonBtn = document.getElementById('generateJsonBtn');
const copyJsonBtn = document.getElementById('copyJsonBtn');
const loadJsonBtn = document.getElementById('loadJsonBtn');
const downloadJsonBtn = document.getElementById('downloadJsonBtn');

let pieces = [];
let selected = null;

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function clamp(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function safeHex(color, fallback = '#4f46e5') {
  return /^#([0-9a-fA-F]{6})$/.test(color) ? color : fallback;
}

function getSelectedPiece() {
  return pieces.find(p => p.id === selected) || null;
}

function syncStyleControls() {
  const current = getSelectedPiece();
  if (!current) {
    opacityValue.textContent = Number(opacityInput.value).toFixed(2);
    return;
  }
  fillColorInput.value = safeHex(current.fill || (current.type === 'text' ? '#ffffff' : '#4f46e5'));
  opacityInput.value = String(typeof current.opacity === 'number' ? current.opacity : 1);
  opacityValue.textContent = Number(opacityInput.value).toFixed(2);
}

function addImage(src, name = 'image') {
  pieces.push({
    id: uid(),
    type: 'img',
    name,
    src,
    x: 100 + pieces.length * 10,
    y: 100 + pieces.length * 10,
    w: 140,
    h: 140,
    opacity: 1,
    fill: '#ffffff'
  });
  selected = pieces[pieces.length - 1].id;
  render();
}

function addTextbox() {
  pieces.push({
    id: uid(),
    type: 'text',
    text: 'Type here...',
    x: 140,
    y: 140,
    w: 170,
    h: 70,
    opacity: 1,
    fill: '#ffffff'
  });
  selected = pieces[pieces.length - 1].id;
  render();
}

function addShape(shape) {
  pieces.push({
    id: uid(),
    type: 'shape',
    shape,
    x: 180,
    y: 180,
    w: 120,
    h: 120,
    opacity: 0.75,
    fill: '#4f46e5'
  });
  selected = pieces[pieces.length - 1].id;
  render();
}

function removePiece(id) {
  pieces = pieces.filter(p => p.id !== id);
  if (selected === id) selected = null;
  render();
}

function attachDrag(el, piece, handle) {
  el.addEventListener('pointerdown', (e) => {
    if (e.target === handle) return;
    if (piece.type === 'text' && e.target === el) {
      const clickedHandle = e.offsetX > el.clientWidth - 20 && e.offsetY > el.clientHeight - 20;
      if (!clickedHandle) {
        selected = piece.id;
        render();
        return;
      }
    }

    selected = piece.id;
    const startX = e.clientX;
    const startY = e.clientY;
    const startLeft = piece.x;
    const startTop = piece.y;

    const move = (ev) => {
      piece.x = clamp(startLeft + (ev.clientX - startX), 0, surface.clientWidth - piece.w);
      piece.y = clamp(startTop + (ev.clientY - startY), 0, surface.clientHeight - piece.h);
      el.style.left = piece.x + 'px';
      el.style.top = piece.y + 'px';
    };

    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      render();
    };

    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  });
}

function attachResize(handle, piece) {
  handle.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    selected = piece.id;
    const startX = e.clientX;
    const startY = e.clientY;
    const startW = piece.w;
    const startH = piece.h;

    const move = (ev) => {
      piece.w = Math.max(40, startW + (ev.clientX - startX));
      piece.h = Math.max(30, startH + (ev.clientY - startY));
      render();
    };

    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
      render();
    };

    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  });
}

function render() {
  surface.innerHTML = '';

  pieces.forEach((piece) => {
    const el = document.createElement('div');
    el.className = 'item' + (piece.id === selected ? ' selected' : '');
    el.style.left = piece.x + 'px';
    el.style.top = piece.y + 'px';
    el.style.width = piece.w + 'px';
    el.style.height = piece.h + 'px';
    el.style.opacity = typeof piece.opacity === 'number' ? piece.opacity : 1;
    el.dataset.id = piece.id;

    if (piece.type === 'img') {
      const img = document.createElement('img');
      img.src = piece.src;
      img.alt = piece.name || 'image';
      el.appendChild(img);
    } else if (piece.type === 'text') {
      el.classList.add('textbox');
      el.style.background = safeHex(piece.fill || '#ffffff', '#ffffff');
      el.textContent = piece.text || '';
      el.contentEditable = 'true';
      el.spellcheck = false;
      el.addEventListener('input', () => {
        piece.text = el.textContent;
      });
      el.addEventListener('focus', () => {
        selected = piece.id;
        syncStyleControls();
      });
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selected = piece.id;
        syncStyleControls();
        render();
      });
    } else if (piece.type === 'shape') {
      el.classList.add('shape', piece.shape === 'circle' ? 'circle' : 'rectangle');
      el.style.background = safeHex(piece.fill || '#4f46e5');
    }

    if (piece.type !== 'text') {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        selected = piece.id;
        syncStyleControls();
        render();
      });
    }

    el.addEventListener('dblclick', (e) => {
      e.stopPropagation();
      removePiece(piece.id);
    });

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    el.appendChild(handle);

    attachDrag(el, piece, handle);
    attachResize(handle, piece);

    surface.appendChild(el);
  });

  syncStyleControls();
}

function encodeSessionData(data) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function decodeSessionData(raw) {
  return JSON.parse(decodeURIComponent(escape(atob(raw))));
}

function generateJsonLink() {
  const encoded = encodeSessionData(pieces);
  const url = location.origin + location.pathname + '#json=' + encoded;
  urlBox.value = url;
  location.hash = 'json=' + encoded;
}

async function copyJsonLink() {
  if (!urlBox.value.trim()) generateJsonLink();
  try {
    await navigator.clipboard.writeText(urlBox.value.trim());
  } catch (e) {
    urlBox.focus();
    urlBox.select();
    document.execCommand('copy');
  }
}

function loadJsonLink() {
  try {
    const rawInput = urlBox.value.trim() || location.href;
    let hash = '';

    if (rawInput.startsWith('http://') || rawInput.startsWith('https://')) {
      const parsed = new URL(rawInput);
      hash = parsed.hash.startsWith('#') ? parsed.hash.slice(1) : parsed.hash;
    } else {
      hash = rawInput.startsWith('#') ? rawInput.slice(1) : rawInput;
    }

    if (!hash.startsWith('json=')) {
      throw new Error('Missing json payload');
    }

    pieces = decodeSessionData(hash.slice(5));
    selected = null;
    render();
  } catch (e) {
    alert('Invalid JSON link');
  }
}

function downloadJsonFile() {
  try {
    const payload = {
      version: 1,
      savedAt: new Date().toISOString(),
      pieces
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = 'game-board-session.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(blobUrl);
  } catch (e) {
    alert('Could not download JSON file');
  }
}

function loadJsonFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      pieces = Array.isArray(data) ? data : (Array.isArray(data.pieces) ? data.pieces : []);
      if (!Array.isArray(pieces)) throw new Error('Invalid structure');
      selected = null;
      render();
    } catch (e) {
      alert('Invalid JSON file');
    }
  };
  reader.readAsText(file);
}

fileInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files || []);
  files.forEach((file) => {
    if (!/^image\/(png|jpeg)$/.test(file.type)) return;
    const reader = new FileReader();
    reader.onload = () => addImage(reader.result, file.name);
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

jsonFileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (file) loadJsonFile(file);
  jsonFileInput.value = '';
});

addTextboxBtn.addEventListener('click', addTextbox);
addRectangleBtn.addEventListener('click', () => addShape('rectangle'));
addCircleBtn.addEventListener('click', () => addShape('circle'));
generateJsonBtn.addEventListener('click', generateJsonLink);
copyJsonBtn.addEventListener('click', copyJsonLink);
loadJsonBtn.addEventListener('click', loadJsonLink);
downloadJsonBtn.addEventListener('click', downloadJsonFile);

fillColorInput.addEventListener('input', () => {
  const current = getSelectedPiece();
  if (!current) return;
  current.fill = fillColorInput.value;
  render();
});

opacityInput.addEventListener('input', () => {
  opacityValue.textContent = Number(opacityInput.value).toFixed(2);
  const current = getSelectedPiece();
  if (!current) return;
  current.opacity = Number(opacityInput.value);
  render();
});

board.addEventListener('click', () => {
  selected = null;
  render();
});

if (location.hash.startsWith('#json=')) {
  try {
    urlBox.value = location.href;
    loadJsonLink();
  } catch (e) {}
}

render();
</script>
</body>
</html>
